<div class="widget-picker">
  <h4>Cards</h4>
  <div class="widget-picker-grid">
    <button type="button" class="widget-picker-item" data-widget-type="income_card">Income</button>
    <button type="button" class="widget-picker-item" data-widget-type="spending_card">Spending</button>
    <button type="button" class="widget-picker-item" data-widget-type="net_savings_card">Net Savings</button>
    <button type="button" class="widget-picker-item" data-widget-type="savings_rate_card">Savings Rate</button>
    <button type="button" class="widget-picker-item" data-widget-type="net_worth_card">Net Worth</button>
  </div>

  <h4>Trend Charts</h4>
  <div class="widget-picker-grid">
    <button type="button" class="widget-picker-item" data-widget-type="income_spending_trend">Income vs Spending</button>
    <button type="button" class="widget-picker-item" data-widget-type="net_worth_trend">Net Worth Trend</button>
    <button type="button" class="widget-picker-item" data-widget-type="savings_rate_trend">Savings Rate Trend</button>
  </div>

  <h4>Breakdown Charts</h4>
  <div class="widget-picker-grid">
    <button type="button" class="widget-picker-item" data-widget-type="category_breakdown">Category Breakdown</button>
    <button type="button" class="widget-picker-item" data-widget-type="group_rollup">Group Rollup</button>
    <button type="button" class="widget-picker-item" data-widget-type="payee_breakdown">Top Payees</button>
    <button type="button" class="widget-picker-item" data-widget-type="month_over_month">Month Over Month</button>
  </div>

  <h4>Stats / Tables</h4>
  <div class="widget-picker-grid">
    <button type="button" class="widget-picker-item" data-widget-type="category_stats_table">Category Stats</button>
    <button type="button" class="widget-picker-item" data-widget-type="account_balances_list">Account Balances</button>
    <button type="button" class="widget-picker-item" data-widget-type="recent_transactions">Recent Transactions</button>
  </div>

  <h4>Projections</h4>
  <div class="widget-picker-grid">
    <button type="button" class="widget-picker-item" data-widget-type="savings_projection">Savings Projection</button>
    <button type="button" class="widget-picker-item" data-widget-type="investment_tracker">Investment Tracker</button>
  </div>
</div>
