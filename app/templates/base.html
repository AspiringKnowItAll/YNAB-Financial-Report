<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}YNAB Financial Report{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3147;
      --text: #e2e4ef;
      --muted: #7b80a0;
      --accent: #6c8fff;
      --accent-hover: #8ba3ff;
      --danger: #ff6b6b;
      --success: #4caf82;
      --warning: #f5a623;
      --radius: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .container--wide {
      max-width: 860px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .card__title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .card__subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo__text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    /* Form elements */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    input[type="password"],
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="url"],
    select,
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
      width: 1rem;
      height: 1rem;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: var(--text);
      text-transform: none;
      letter-spacing: normal;
      cursor: pointer;
    }

    /* Hint text under a field */
    .field-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-align: center;
    }

    .btn--primary {
      background: var(--accent);
      color: #fff;
    }

    .btn--primary:hover { background: var(--accent-hover); }

    .btn--block { width: 100%; display: block; }

    /* Alerts */
    .alert {
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    .alert--error {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.4);
      color: #ff9e9e;
    }

    .alert--success {
      background: rgba(76,175,130,0.12);
      border: 1px solid rgba(76,175,130,0.4);
      color: #7de0b0;
    }

    .alert--warning {
      background: rgba(245,166,35,0.12);
      border: 1px solid rgba(245,166,35,0.4);
      color: #f7c96a;
    }

    /* Section headers inside settings */
    .section-header {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.25rem;
      margin-top: 2rem;
    }

    .section-header:first-of-type { margin-top: 0; }

    /* Nav bar */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar__brand {
      font-weight: 700;
      color: var(--accent);
      font-size: 1rem;
    }

    .navbar__links a {
      margin-left: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .navbar__links a:hover { color: var(--text); }

    /* Utility */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .text-center { text-align: center; }
    .text-muted { color: var(--muted); font-size: 0.875rem; }

    /* Secret placeholder badge */
    .secret-badge {
      display: inline-block;
      background: var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block nav %}{% endblock %}
  {% block content %}{% endblock %}
</body>
</html>
